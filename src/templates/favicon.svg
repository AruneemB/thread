<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Thread favicon — a 5-week × 7-day contribution graph fragment.
    Activity builds from left (quiet) to right (active streak).
    Uses the exact teal ramp from the dashboard spec.
  -->

  <!-- Mon -->
  <rect x="20"   y="7.5"  width="10" height="10" rx="2.5" fill="#e1f5ee"/>
  <rect x="32.5" y="7.5"  width="10" height="10" rx="2.5" fill="#9fe1cb"/>
  <rect x="45"   y="7.5"  width="10" height="10" rx="2.5" fill="#5dcaa5"/>
  <rect x="57.5" y="7.5"  width="10" height="10" rx="2.5" fill="#1d9e75"/>
  <rect x="70"   y="7.5"  width="10" height="10" rx="2.5" fill="#0f6e56"/>

  <!-- Tue -->
  <rect x="20"   y="20" width="10" height="10" rx="2.5" fill="#9fe1cb"/>
  <rect x="32.5" y="20" width="10" height="10" rx="2.5" fill="#5dcaa5"/>
  <rect x="45"   y="20" width="10" height="10" rx="2.5" fill="#9fe1cb"/>
  <rect x="57.5" y="20" width="10" height="10" rx="2.5" fill="#0f6e56"/>
  <rect x="70"   y="20" width="10" height="10" rx="2.5" fill="#1d9e75"/>

  <!-- Wed -->
  <rect x="20"   y="32.5" width="10" height="10" rx="2.5" fill="#e1f5ee"/>
