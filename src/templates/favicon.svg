  <rect x="45"   y="32.5" width="10" height="10" rx="2.5" fill="#1d9e75"/>
  <rect x="57.5" y="32.5" width="10" height="10" rx="2.5" fill="#1d9e75"/>
  <rect x="70"   y="32.5" width="10" height="10" rx="2.5" fill="#0f6e56"/>

  <!-- Thu -->
  <rect x="20"   y="45" width="10" height="10" rx="2.5" fill="#9fe1cb"/>
  <rect x="32.5" y="45" width="10" height="10" rx="2.5" fill="#1d9e75"/>
  <rect x="45"   y="45" width="10" height="10" rx="2.5" fill="#0f6e56"/>
  <rect x="57.5" y="45" width="10" height="10" rx="2.5" fill="#5dcaa5"/>
  <rect x="70"   y="45" width="10" height="10" rx="2.5" fill="#1d9e75"/>

  <!-- Fri -->
  <rect x="20"   y="57.5" width="10" height="10" rx="2.5" fill="#e1f5ee"/>
  <rect x="32.5" y="57.5" width="10" height="10" rx="2.5" fill="#5dcaa5"/>
  <rect x="45"   y="57.5" width="10" height="10" rx="2.5" fill="#1d9e75"/>
  <rect x="57.5" y="57.5" width="10" height="10" rx="2.5" fill="#0f6e56"/>
  <rect x="70"   y="57.5" width="10" height="10" rx="2.5" fill="#0f6e56"/>

  <!-- Sat -->
  <rect x="20"   y="70" width="10" height="10" rx="2.5" fill="#e1f5ee"/>
  <rect x="32.5" y="70" width="10" height="10" rx="2.5" fill="#e1f5ee"/>
  <rect x="45"   y="70" width="10" height="10" rx="2.5" fill="#9fe1cb"/>
  <rect x="57.5" y="70" width="10" height="10" rx="2.5" fill="#5dcaa5"/>
