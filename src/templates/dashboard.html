<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Dashboard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal-50: #e1f5ee;
      --teal-200: #9fe1cb;
      --teal-400: #5dcaa5;
      --teal-600: #1d9e75;
      --teal-800: #0f6e56;
    }

    body {
      width: 900px;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
    }

    .group-name {
      font-weight: 700;
      font-size: 18px;
      color: #1a1a1a;
    }

    .date-range {
      font-weight: 400;
      font-size: 14px;
      color: #6b7280;
    }

    .sort-bar {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    .sort-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      background: #f3f4f6;
      color: #374151;
    }

    .sort-btn.active {
      background: var(--teal-600);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="group-name">[Group Name]</span>
    <span class="date-range">[date range]</span>
  </div>

  <div class="sort-bar">
    <button class="sort-btn active">total messages</button>
    <button class="sort-btn">streak</button>
    <button class="sort-btn">longest</button>
    <button class="sort-btn">recent</button>
  </div>
</body>
</html>
