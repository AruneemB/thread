<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Dashboard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --teal-50: #e1f5ee;
      --teal-200: #9fe1cb;
      --teal-400: #5dcaa5;
      --teal-600: #1d9e75;
      --teal-800: #0f6e56;
    }

    body {
      width: 900px;
      background: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
    }

    .group-name {
      font-weight: 700;
      font-size: 18px;
      color: #1a1a1a;
    }

    .date-range {
      font-weight: 400;
      font-size: 14px;
      color: #6b7280;
    }

    .sort-bar {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    .sort-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      background: #f3f4f6;
      color: #374151;
    }

    .sort-btn.active {
      background: var(--teal-600);
      color: #ffffff;
    }

    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 24px;
    }

    .legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
    }

    .legend-label {
      font-size: 12px;
      color: #6b7280;
      padding: 0 6px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .member-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      flex-shrink: 0;
    }

    .member-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .display-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .role-label {
      font-size: 12px;
      color: #6b7280;
    }

    .member-stats {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat {
      font-size: 13px;
      color: #374151;
    }

    .streak-pills {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .pill-active {
      background: var(--teal-600);
      color: #ffffff;
    }

    .pill-grey {
      background: #f3f4f6;
      color: #374151;
    }

    .calendar-wrapper {
      display: flex;
    }

    .day-labels {
      display: flex;
      flex-direction: column;
      width: 20px;
      padding-top: 20px;
    }

    .day-label {
      height: 11px;
      margin-bottom: 2px;
      font-size: 9px;
      color: #6b7280;
      line-height: 11px;
    }

    .calendar-column {
      display: flex;
      flex-direction: column;
    }

    .month-labels {
      display: flex;
      height: 20px;
      position: relative;
    }

    .month-label {
      position: absolute;
      font-size: 9px;
      color: #6b7280;
      top: 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(53, 11px);
      grid-template-rows: repeat(7, 11px);
      gap: 2px;
      overflow: hidden;
    }

    .cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }

    .cell-0 { background: #e1f5ee; }
    .cell-1 { background: #9fe1cb; }
    .cell-2 { background: #5dcaa5; }
    .cell-3 { background: #1d9e75; }
    .cell-4 { background: #0f6e56; }
    .cell-future { background: transparent; }
  </style>
</head>

  <script>
  (function () {
    var SORT_MAP = {
      messages: { label: 'total messages', key: 'totalMessages' },
      streak:   { label: 'streak',         key: 'currentStreak' },
      longest:  { label: 'longest',        key: 'longestStreak' },
      recent:   { label: 'recent',         key: 'activeDays' }
    };

    var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function formatNumber(n) {
      return n.toLocaleString('en-US');
    }

    function cellClass(count, maxCount) {
      if (count < 0) return 'cell-future';
      if (count === 0 || maxCount === 0) return 'cell-0';
      var pct = (count / maxCount) * 100;
      if (pct <= 15) return 'cell-1';
      if (pct <= 45) return 'cell-2';
      if (pct <= 70) return 'cell-3';
      return 'cell-4';
    }

    function buildMemberCard(member) {
      var card = document.createElement('div');
      card.className = 'member-card';

      // Header
      var header = document.createElement('div');
      header.className = 'member-header';

      var info = document.createElement('div');
      info.className = 'member-info';

      var avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.style.background = member.avatarColor;
      avatar.textContent = member.initials;

      var name = document.createElement('span');
      name.className = 'display-name';
      name.textContent = member.displayName;

      var role = document.createElement('span');
      role.className = 'role-label';
      role.textContent = member.role;

      info.appendChild(avatar);
      info.appendChild(name);
      info.appendChild(role);

      var stats = document.createElement('div');
      stats.className = 'member-stats';

      var msgStat = document.createElement('span');
      msgStat.className = 'stat';
      msgStat.textContent = formatNumber(member.totalMessages) + ' msgs';

      var streakStat = document.createElement('span');
      streakStat.className = 'stat';
      streakStat.textContent = member.currentStreak + 'd';

      var longestStat = document.createElement('span');
      longestStat.className = 'stat';
      longestStat.textContent = member.longestStreak + 'd';

      stats.appendChild(msgStat);
      stats.appendChild(streakStat);
      stats.appendChild(longestStat);

      header.appendChild(info);
      header.appendChild(stats);
      card.appendChild(header);

      // Calendar placeholder (all cell-0)
      var calWrapper = document.createElement('div');
      calWrapper.className = 'calendar-wrapper';

      var dayLabels = document.createElement('div');
      dayLabels.className = 'day-labels';
      var dayTexts = ['M', '', 'W', '', 'F', '', ''];
      for (var d = 0; d < 7; d++) {
        var dl = document.createElement('span');
        dl.className = 'day-label';
        dl.textContent = dayTexts[d];
        dayLabels.appendChild(dl);
      }

      var calColumn = document.createElement('div');
      calColumn.className = 'calendar-column';

      var monthRow = document.createElement('div');
      monthRow.className = 'month-labels';

      var grid = document.createElement('div');
      grid.className = 'calendar-grid';
      for (var i = 0; i < 371; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell cell-0';
        grid.appendChild(cell);
      }

      calColumn.appendChild(monthRow);
      calColumn.appendChild(grid);
      calWrapper.appendChild(dayLabels);
      calWrapper.appendChild(calColumn);
      card.appendChild(calWrapper);

      // Streak pills
      var pills = document.createElement('div');
      pills.className = 'streak-pills';

      var currentPill = document.createElement('span');
      currentPill.className = 'pill ' + (member.currentStreak > 0 ? 'pill-active' : 'pill-grey');
      currentPill.textContent = member.currentStreak + ' day streak';

      var bestPill = document.createElement('span');
      bestPill.className = 'pill pill-grey';
      bestPill.textContent = 'Best: ' + member.longestStreak + ' days';

      var activePill = document.createElement('span');
      activePill.className = 'pill pill-grey';
      activePill.textContent = member.activeDays + ' active';

      pills.appendChild(currentPill);
      pills.appendChild(bestPill);
      pills.appendChild(activePill);
      card.appendChild(pills);

      return card;
    }

    function renderCards(container, members, sortKey) {
      container.innerHTML = '';
      var sorted = members.slice().sort(function (a, b) {
        return b[sortKey] - a[sortKey];
      });
      for (var i = 0; i < sorted.length; i++) {
        container.appendChild(buildMemberCard(sorted[i]));
      }
    }

    function render() {
      var data = window.__THREAD_DATA__;
      if (!data) return;

      // Header binding
      var groupNameEl = document.querySelector('.group-name');
      if (groupNameEl) groupNameEl.textContent = data.groupName;

      var dateRangeEl = document.querySelector('.date-range');
      if (dateRangeEl) dateRangeEl.textContent = data.dateRange;

      // Sort button active state
      var buttons = document.querySelectorAll('.sort-btn');
      var activeLabel = SORT_MAP[data.sortBy] ? SORT_MAP[data.sortBy].label : 'total messages';
      var activeSortKey = SORT_MAP[data.sortBy] ? SORT_MAP[data.sortBy].key : 'totalMessages';

      for (var bi = 0; bi < buttons.length; bi++) {
        if (buttons[bi].textContent.trim() === activeLabel) {
          buttons[bi].classList.add('active');
        } else {
          buttons[bi].classList.remove('active');
        }
      }

      // Member cards
      var container = document.querySelector('.cards-container');
      if (container) {
        renderCards(container, data.members, activeSortKey);
      }
    }

    window.renderDashboard = render;
  })();
  </script>
</body>
</html>
